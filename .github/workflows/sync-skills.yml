# Splits skills/ and pushes to Edge-City/Agentvillage-skills when main is updated.
#
# Edge-City/Agentvillage-skills is the standalone, plugin-installable repo.
# Its root IS the skills/ directory, so plugin manifests (.claude-plugin/,
# .codex-plugin/, openclaw.plugin.json) land at the repo root where
# installers expect them.
name: Sync Agentvillage-skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

concurrency:
  group: sync-skills
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Split and push
        env:
          GH_PAT: ${{ secrets.SKILLS_SYNC_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${GH_PAT:-}" ]; then
            echo "❌ SKILLS_SYNC_PAT secret is not set."
            exit 1
          fi
          echo "Splitting skills/ on main..."
          SPLIT_SHA=$(git subtree split --prefix=skills main)
          echo "Split SHA: $SPLIT_SHA"
          git push --force \
            "https://x-access-token:${GH_PAT}@github.com/Edge-City/Agentvillage-skills.git" \
            "${SPLIT_SHA}:refs/heads/main"
          echo "✓ pushed to Edge-City/Agentvillage-skills (main)"
